<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Preconnect to external origins: starts DNS+TLS handshake early, saves ~100-300ms on first paint -->
    <link rel="preconnect" href="https://godieboy.com" />
    <link rel="preconnect" href="https://accounts.google.com" />

    <!-- Preload the LCP hero image: starts the fetch in parallel with JS bundle download,
         so the screenshot is ready to paint the moment React mounts. -->
    <link rel="preload" as="image" href="/screenshots/table_view.png" fetchpriority="high" />

    <!-- Speculation Rules: tell Chromium 105+ browsers to prerender the three
         most likely next SPA routes from the landing page. `moderate` eagerness
         fires on ~200ms hover/focus, intent-correlated without wasting CPU on
         idle users. Other browsers ignore this script silently (and prerender
         will be unsupported in unsupported browsers). Spec syntax: `href_matches`
         accepts an array of URL pattern strings (NOT a pipe-separated literal,
         which would be a single pattern that matches nothing). -->
    <script type="speculationrules">
    {
      "prerender": [{
        "where": {
          "href_matches": [
            "/?page=applications",
            "/?page=opportunities",
            "/?page=insights"
          ]
        },
        "eagerness": "moderate"
      }]
    }
    </script>

    <!-- Favicon: WebP (~1.7 KB) for modern browsers, AVIF (~1.2 KB) preferred where supported.
         The remote godieboy.com SVG fallback remains for browsers that bypass /favicon-64. -->
    <link rel="icon" type="image/webp" href="/favicon-64.webp" sizes="64x64" />
    <link rel="icon" type="image/avif" href="/favicon-64.avif" sizes="64x64" />
    <link rel="icon" type="image/svg+xml" href="https://godieboy.com/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.webp" sizes="192x192" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Job Application Tracker (JAJAT) - Track and manage your job applications with timeline views, calendar integration, and Google Sheets sync. Stay organized throughout your job search journey." />

    <!-- Canonical (overridden dynamically by useSEO) -->
    <link rel="canonical" href="https://jajat.godieboy.com/" />

    <!-- Open Graph fallbacks -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="JAJAT - Job Application Tracker" />
    <meta property="og:title"       content="JAJAT - Job Application Tracker" />
    <meta property="og:description" content="Track and manage your job applications with timeline views, Kanban boards, and Google Sheets sync." />
    <meta property="og:image"       content="https://jajat.godieboy.com/jajat-logo.png" />
    <meta property="og:url"         content="https://jajat.godieboy.com/" />

    <!-- Twitter Card fallbacks -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="JAJAT - Job Application Tracker" />
    <meta name="twitter:description" content="Track and manage your job applications with timeline views, Kanban boards, and Google Sheets sync." />
    <meta name="twitter:image"       content="https://jajat.godieboy.com/jajat-logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!--
      Content Security Policy (CSP) — see v2.6.30 + v2.6.32 CHANGELOGs for rationale.

      v2.6.30: `frame-ancestors` is the ONLY directive ignored when delivered
      via `<meta http-equiv>` (W3C CSP spec §6.1); it MUST come from an HTTP
      response header. The directive is correctly enforced by the HTTP header
      layer (Apache `public/.htaccess` + PHP `api/src/Core/Security.php` +
      Vite dev server `vite.config.ts`). The `<meta>` tag covers the other
      directives for first-paint defense-in-depth before HTTP headers arrive.

      v2.6.32: comprehensive CSP audit added two previously-missing
      `connect-src` domains (`gmail.googleapis.com` for the Gmail scan
      feature in `src/mails/providers/gmail/gmailClient.ts` and
      `generativelanguage.googleapis.com` for the Gemini API in
      `src/utils/geminiApi.ts` — both were silently blocked at runtime) and
      added the following defense-in-depth directives:

      - `base-uri 'self'` — prevent <base> tag injection
      - `form-action 'self'` — prevent form hijacking to external sites
      - `object-src 'none'` — block plugins (Flash, Java)
      - `frame-src https://accounts.google.com` — allow ONLY the GSI SDK's
        own iframe (Sign-In button + One-Tap + session management); block
        all other iframes (the app loads no other iframes)
      - `worker-src 'self'` — allow the Service Worker generated by
        `vite-plugin-pwa` (`/sw.js` at runtime, `/registerSW.js` precached);
        block all other workers
      - `manifest-src 'self'` — allow the PWA web app manifest generated by
        `vite-plugin-pwa` (`/manifest.webmanifest` at runtime)

      The `'unsafe-inline'` source for `script-src` + `style-src` is required
      for Vite's dev-mode HMR injection (Vite injects inline scripts/styles
      for HMR + React Refresh) and for the existing inline `<script>` blocks
      in `index.html` (the Speculation Rules + the theme-pre-mount IIFE, per
      the v2.4.0 CHANGELOG's "Inline `<style>` block" note: the
      `@keyframes slideInRight` was moved to `src/index.css` for CSP-safety,
      but the index.html `<script type="speculationrules">` + the theme IIFE
      remain inline because they're document-head critical). The
      `img-src 'self' data: https:;` source is required for the OG image
      preloads + the remote SVG favicon fallback
      (`https://godieboy.com/favicon.ico`) in `index.html`. The
      `connect-src 'self' https://accounts.google.com
      https://oauth2.googleapis.com https://www.googleapis.com;` is
      required for the Google sign-in flow + the Google Sheets sync feature
      (XHR/fetch to those endpoints). A nonce/hashes tightening pass is
      deferred to a separate followup that scopes the HMR + inline-script
      surface; the current `'unsafe-inline'` is a deliberate, documented
      allow-list, not a v1 concession. The directive list stops at
      `manifest-src 'self';`; no `frame-ancestors` directive is set here
      (deliberate omission — must come from an HTTP response header, see
      v2.6.30 above).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://*.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://accounts.google.com https://oauth2.googleapis.com https://www.googleapis.com https://gmail.googleapis.com https://generativelanguage.googleapis.com; base-uri 'self'; form-action 'self'; object-src 'none'; frame-src https://accounts.google.com; worker-src 'self'; manifest-src 'self';" />
    <title>JAJAT</title>
    <script>
      // Apply theme before React mounts to prevent flash
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
