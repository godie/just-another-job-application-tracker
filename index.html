<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Preconnect to external origins: starts DNS+TLS handshake early, saves ~100-300ms on first paint -->
    <link rel="preconnect" href="https://godieboy.com" />
    <link rel="preconnect" href="https://accounts.google.com" />

    <!-- Preload the LCP hero image: starts the fetch in parallel with JS bundle download,
         so the screenshot is ready to paint the moment React mounts. -->
    <link rel="preload" as="image" href="/screenshots/table_view.png" fetchpriority="high" />

    <!-- Favicon: WebP (~1.7 KB) for modern browsers, AVIF (~1.2 KB) preferred where supported.
         The remote godieboy.com SVG fallback remains for browsers that bypass /favicon-64. -->
    <link rel="icon" type="image/webp" href="/favicon-64.webp" sizes="64x64" />
    <link rel="icon" type="image/avif" href="/favicon-64.avif" sizes="64x64" />
    <link rel="icon" type="image/svg+xml" href="https://godieboy.com/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.webp" sizes="192x192" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="description" content="Job Application Tracker (JAJAT) - Track and manage your job applications with timeline views, calendar integration, and Google Sheets sync. Stay organized throughout your job search journey." />

    <!-- Canonical (overridden dynamically by useSEO) -->
    <link rel="canonical" href="https://jajat.godieboy.com/" />

    <!-- Open Graph fallbacks -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="JAJAT - Job Application Tracker" />
    <meta property="og:title"       content="JAJAT - Job Application Tracker" />
    <meta property="og:description" content="Track and manage your job applications with timeline views, Kanban boards, and Google Sheets sync." />
    <meta property="og:image"       content="https://jajat.godieboy.com/jajat-logo.png" />
    <meta property="og:url"         content="https://jajat.godieboy.com/" />

    <!-- Twitter Card fallbacks -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="JAJAT - Job Application Tracker" />
    <meta name="twitter:description" content="Track and manage your job applications with timeline views, Kanban boards, and Google Sheets sync." />
    <meta name="twitter:image"       content="https://jajat.godieboy.com/jajat-logo.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>JAJAT</title>
    <script>
      // Apply theme before React mounts to prevent flash
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
