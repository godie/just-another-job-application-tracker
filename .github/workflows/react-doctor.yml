# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: React Doctor

on:
  # Scans the PR's changed files and posts a sticky summary comment listing only the new issues introduced relative to the merge base of the target branch.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Scans `main` on every push to track the health-score trend and catch regressions that slipped past PR review.
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancels any in-flight scan for the same PR (or branch, on push) the moment a new commit arrives, so reviewers only ever see the latest run.
concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: millionco/react-doctor@v2
        # React Doctor CI gate — graduated to `blocking: error` (PR #214, 2.6.12)
        # and pinned to `version: "0.5.8"` (PR #217, this PR, 2.6.14).
        #
        # `blocking: error` fails the check on any NEW error-severity finding
        # introduced by the PR diff against the merge base. Warning-severity
        # findings still surface in the sticky PR summary + inline review
        # comments but do not block the merge.
        #
        # `version: "0.5.8"` locks the gate's contract to a deterministic,
        # known-passing tool version (matches the local CLI baseline at
        # commit `cdafe81` per `DOCS/REACT_DOCTOR_AUDIT.md` "Verification
        # snapshot": 0 issues / 100/100). Bump in a followup PR after
        # validating a newer version against 2-3 React-touching PRs.
        #
        # The default `scope: changed-files` is preserved on PRs so the gate
        # fires only on the diff against the merge base (unaffected by
        # pre-existing findings on `main`). Baseline + intentional suppressions
        # live in `DOCS/REACT_DOCTOR_AUDIT.md` — that document is the source
        # of truth for the gate's health score, not the workflow file.
        #
        # Full reference: https://www.react.doctor/ci
        with:
          blocking: error
          version: "0.5.8"
