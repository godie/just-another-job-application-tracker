# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: React Doctor

on:
  # Scans the PR's changed files and posts a sticky summary comment listing only the new issues introduced relative to the merge base of the target branch.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Scans `main` on every push to track the health-score trend and catch regressions that slipped past PR review.
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancels any in-flight scan for the same PR (or branch, on push) the moment a new commit arrives, so reviewers only ever see the latest run.
concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: millionco/react-doctor@v2
        # React Doctor CI gate — graduated to `blocking: error`. The action now
        # fails the `react-doctor` check on any NEW error-severity finding
        # introduced by the PR diff (against the merge base). Warning-severity
        # findings still surface in the sticky PR summary + inline review
        # comments but do not block the merge.
        # The default `scope` (changed-files on PRs, full project on push to
        # `main`) is preserved: the gate fires on the diff against the merge
        # base, not on pre-existing findings in `main`.
        # The remaining options (`comment`, `review-comments`, `commit-status`,
        # `version`, `directory`, `project`) stay at default — the sticky PR
        # summary, inline review comments, and score commit status remain
        # visible so reviewers see the signal even when the gate is green.
        # Baseline: see `DOCS/REACT_DOCTOR_AUDIT.md` for the live suppression
        # inventory and current health score.
        # Full reference: https://www.react.doctor/ci
        with:
          blocking: error
