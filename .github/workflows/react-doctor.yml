# React Doctor — finds security, performance, correctness, accessibility,
# bundle-size, and architecture issues in React codebases.
#
# Docs: https://www.react.doctor/ci
# Source: https://github.com/millionco/react-doctor

name: React Doctor

on:
  # Scans the PR's changed files and posts a sticky summary comment listing only the new issues introduced relative to the merge base of the target branch.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  # Scans `main` on every push to track the health-score trend and catch regressions that slipped past PR review.
  push:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

# Cancels any in-flight scan for the same PR (or branch, on push) the moment a new commit arrives, so reviewers only ever see the latest run.
concurrency:
  group: react-doctor-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  react-doctor:
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. The `millionco/react-doctor@v2` action is
    # normally fast (< 2 min for a typical PR diff), but a slow
    # dependency install or a hung action step could sit at `pending`
    # indefinitely. 10 min is a generous ceiling. See AGENTS.md
    # "CI Race Playbook".
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: millionco/react-doctor@v2
        # React Doctor CI gate — graduated to `blocking: error` (PR #214, 2.6.12),
        # pinned to `version: "0.5.8"` (PR #217, 2.6.14), and now escalated to
        # `blocking: warning` (this PR, Issue #216 followup, 2.6.15). The
        # "version pin first, then escalate strictness" ordering in the
        # Issue #216 / Issue #215 followup chain codifies why #216 could not
        # land before #217: a strictness escalation against an unpinned,
        # floating action version is a regression-risk maneuver, not a tightening.
        #
        # `blocking: warning` keeps the action's PR-summary + inline-review-comment
        # + score-status surfaces visible (so reviewers still see new error-severity
        # findings), but no longer fails the `react-doctor` check on the diff.
        # New error-severity findings instead surface ONLY in the review surfaces;
        # the merge contract reverts to advisory. Rationale: the project baseline
        # at commit `cdafe81` per `DOCS/REACT_DOCTOR_AUDIT.md` is 0 issues / 100/100,
        # but `blocking: error` makes the merge contract brittle to any future
        # `oxlint-plugin-react-doctor` upgrade that adds a new rule — we lose the
        # ability to validate the new rule against a few real PRs before it becomes
        # merge-blocking. Escalating to `blocking: warning` is the strictness
        # appropriate to the current state ("known-passing local baseline + pinned
        # version + future-version-validation tolerance").
        #
        # `version: "0.5.8"` locks the gate's contract to a deterministic,
        # known-passing tool version (matches the local CLI baseline at
        # commit `cdafe81` per `DOCS/REACT_DOCTOR_AUDIT.md` "Verification
        # snapshot": 0 issues / 100/100). Bump in a followup PR after
        # validating a newer version against 2-3 React-touching PRs.
        #
        # The default `scope: changed-files` is preserved on PRs so the gate
        # fires only on the diff against the merge base (unaffected by
        # pre-existing findings on `main`). Baseline + intentional suppressions
        # live in `DOCS/REACT_DOCTOR_AUDIT.md` — that document is the source
        # of truth for the gate's health score, not the workflow file.
        #
        # Full reference: https://www.react.doctor/ci
        with:
          blocking: warning
          version: "0.5.8"
