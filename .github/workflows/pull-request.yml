name: Pull Request

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build project
        run: npm run build

  knip:
    name: Unused Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Knip
        run: npm run knip

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

      - name: Scan for secrets with local script
        run: bash scripts/scan-secrets.sh --ci

      - name: Check workflow-file wrappers
        # Pre-merge gate that catches workflow files missing the required
        # top-level `name:`, `on:`, and `jobs:` wrapper keys (the regression
        # class observed when PR #206's squash stripped `deploy.yml`'s wrapper).
        # Fail-fast: runs after secret scan so the secrets job still surfaces
        # any secret findings on the PR even when the workflow-shape layer
        # would block the build.
        run: bash scripts/check-workflow-shape.sh --ci

  composer-validate:
    name: Composer validate
    uses: ./.github/workflows/composer-validate.yml
