name: Pull Request

on:
  pull_request:
    branches:
      - main

# Cancel in-progress runs of the same workflow on the same ref. Without this,
# pushing a new commit to a PR strings stale jobs back-to-back, exhausting
# GitHub's parallel runner limits and causing subsequent jobs to sit at
# `pending` for the full queue-stall duration. Mirrors the pattern already
# used by `.github/workflows/orphan-sweep.yml` (see its `concurrency` block).
# The `${{ github.workflow }}-${{ github.ref }}` group key ensures each PR's
# runs are scoped independently — a push to PR #1 does NOT cancel PR #2's
# in-flight checks. See AGENTS.md "CI Race Playbook" for the design.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. `npm run lint` is normally < 30s, but a hung
    # npm-registry fetch or a slow cache restore could sit at `pending`
    # indefinitely without this cap. 5 min is a generous ceiling for the
    # work + ample cold-runner headroom. See AGENTS.md "CI Race Playbook".
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. Vitest is normally 30s-2min on this repo
    # (868 tests per the AGENTS.md Quality Assurance Checklist), but a
    # Vitest OOM, a happy-dom hang, or an npm-registry stall could sit
    # at `pending` indefinitely. 15 min is the longest of the five
    # timeouts because Vitest is the only job with non-deterministic
    # test counts and potential happy-dom leaks — it's the job that
    # most plausibly could hit the cap on a real regression. See
    # AGENTS.md "CI Race Playbook".
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. Vite 7 production build is normally 1-3 min
    # on this repo, but a slow cache restore, an unresolvable import, or
    # a hung esbuild worker could sit at `pending` indefinitely. 10 min
    # is a generous ceiling for the work + ample cold-runner headroom.
    # See AGENTS.md "CI Race Playbook".
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build project
        run: npm run build

  knip:
    name: Unused Code
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. `npm run knip` is normally < 30s, but a knip
    # bug or a slow dep-graph crawl could sit at `pending` indefinitely.
    # 5 min is a generous ceiling for the work + ample cold-runner
    # headroom. See AGENTS.md "CI Race Playbook".
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Knip
        run: npm run knip

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. The `fetch-depth: 0` checkout + TruffleHog
    # full-history scan is the slowest step in this job (TruffleHog
    # alone can take 3-5 min on a repo of this size with a cold
    # TruffleHog binary cache). A network stall mid-scan or a hung
    # TruffleHog process would otherwise sit at `pending` indefinitely.
    # 10 min is a generous ceiling that accommodates worst-case cold
    # cache + ample headroom. See AGENTS.md "CI Race Playbook".
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with TruffleHog
        uses: trufflesecurity/trufflehog@9b6b5326bfe25dbd856eccc8a8275eb5dea7bd52 # main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified

      - name: Scan for secrets with local script
        run: bash scripts/scan-secrets.sh --ci

      - name: Check workflow-file wrappers
        # Pre-merge gate that catches workflow files missing the required
        # top-level `name:`, `on:`, and `jobs:` wrapper keys (the regression
        # class observed when PR #206's squash stripped `deploy.yml`'s wrapper).
        # Fail-fast: runs after secret scan so the secrets job still surfaces
        # any secret findings on the PR even when the workflow-shape layer
        # would block the build.
        run: bash scripts/check-workflow-shape.sh --ci

      - name: Check workflow-file job timeouts
        # Pre-merge gate that fails when any job in any workflow is missing
        # a `timeout-minutes:` cap. Catches the regression class that
        # produced the recurring "Test pending forever" race in the
        # post-2.6.20 cycle (PRs #226, #227, #228, #229, #230, #231, #232
        # all hit the same pattern: a job sat at `pending` indefinitely
        # because the workflow file omitted a `timeout-minutes:` cap, and
        # the merge had to bypass via `--admin`). See AGENTS.md
        # "CI Race Playbook" for the design rationale and post-mortem.
        # Mirrors the style of `scripts/check-workflow-shape.sh` (bash,
        # --ci mode flag, ::error file= annotations, set -euo pipefail).
        run: bash scripts/check-yml-timeouts.sh --ci

  composer-validate:
    name: Composer validate
    uses: ./.github/workflows/composer-validate.yml
    # CI RACE: bounded wait. The called `composer-validate.yml` reusable
    # workflow has its own `timeout-minutes: 10` cap, but the calling
    # job here ALSO needs a cap (the calling-side cap governs how long
    # the reusable workflow call can run before GHA cancels it). 10 min
    # matches the called workflow's own ceiling. See AGENTS.md
    # "CI Race Playbook".
    timeout-minutes: 10

  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    # Explicit read-only permissions: the job only runs tests, no gh
    # or write operations. Mirrors the composer-validate job's
    # permissions block.
    permissions:
      contents: read
    # 10 min safety margin: composer install is normally ~30-60s on
    # cold cache, phpunit is ~5-15s for the current 66 tests / 223
    # assertions. 5 min would be tight if the runner pulls a fresh
    # composer cache; 10 min matches the composer-validate workflow's
    # safety margin for the same reason.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          # php-version MUST stay in lock-step with the deploy
          # workflow's main job (deploy.yml line 32 + 237) and the
          # composer-validate workflow's default. Drift produces a
          # CI-vs-deploy PHP-version mismatch identical in failure
          # mode to the v2.6.0 release cycle's symfony/options-
          # resolver 8.1.0 episode.
          php-version: '8.4'
          tools: composer:v2

      - name: Composer install (with dev deps for phpunit)
        working-directory: api
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run PHPUnit
        working-directory: api
        run: vendor/bin/phpunit --configuration phpunit.xml
