name: Deploy

on:
  push:
    branches:
      - main

# v2.6.33 CI RACE: extend the v2.6.29 `concurrency.cancel-in-progress: true`
# hardening to the deploy workflow. The v2.6.29 fix landed only on
# `pull-request.yml` (line 11) and `orphan-sweep.yml` (line 23), leaving
# the deploy workflow's 3 jobs (build + deploy + composer-validate) able
# to pile up stale runs on a rapid series of main pushes, re-introducing
# the same parallel-runner-exhaustion pattern that v2.6.29 fixed for the
# PR workflow. The `${{ github.workflow }}-${{ github.ref }}` group key
# ensures each main-branch deploy is scoped independently — a push to a
# different ref (if `on: push` is ever widened) does NOT cancel a
# main-branch deploy in flight.
#
# Cancellation safety: a mid-deploy cancel is recoverable because the
# rsync step uses `--partial` (line ~225: `ARGS="-az --delete --chmod=...
# --partial --progress"`), which preserves partially-transferred files
# in place. A re-push triggers a fresh rsync that resumes against the
# partial destination, so the prod server is never left in a
# half-deployed state longer than the next push. This is the same
# trade-off v2.6.29 made for `pull-request.yml`. See AGENTS.md
# "CI Race Playbook" for the design rationale and post-mortem on the
# post-2.6.20 cycle of `--admin` bypasses.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. npm ci + Vite build + composer install (no-dev)
    # + tarball typically take 3-6 min on cold cache. 15 min is a generous
    # ceiling for the work + ample cold-runner headroom. See AGENTS.md
    # "CI Race Playbook".
    timeout-minutes: 15
    needs: composer-validate
    outputs:
      artifact-path: ./dist

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build project
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Copy api/ into dist/ (include dotfiles e.g. .htaccess)
        run: cp -r api dist/

      - name: Install Composer dependencies for production
        working-directory: dist/api
        run: composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

      - name: Create config.php from example for deploy
        run: cp dist/api/config.example.php dist/api/config.php

      - name: Verify deployable PHP files exist before upload
        run: |
          echo "Files in dist/api/:"
          ls -la dist/api/
          if [ -f dist/api/.htaccess ]; then
            echo "✓ .htaccess found"
          else
            echo "✗ .htaccess NOT found"
            exit 1
          fi
          if [ -f dist/api/vendor/autoload.php ]; then
            echo "✓ vendor/autoload.php found"
          else
            echo "✗ vendor/autoload.php NOT found"
            exit 1
          fi

      - name: Create tarball to preserve all files including dotfiles
        run: tar -czf dist.tar.gz -C dist .

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: dist.tar.gz

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # CI RACE: bounded wait. The deploy job is the longest in the repo:
    # artifact download + extract + 12 deploy steps + rsync with 5-attempt
    # retry (the rsync step alone can legitimately take 5-10 min on a slow
    # network with retries). 30 min is a generous ceiling that accommodates
    # worst-case cold cache + ample retry headroom. See AGENTS.md
    # "CI Race Playbook".
    timeout-minutes: 30

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./

      - name: Extract tarball
        run: |
          mkdir -p dist
          tar -xzf dist.tar.gz -C dist
          rm -f dist.tar.gz

      - name: Verify deployable PHP files exist after extraction
        run: |
          echo "Files in dist/api/:"
          ls -la dist/api/
          if [ -f dist/api/.htaccess ]; then
            echo "✓ .htaccess found"
          else
            echo "✗ .htaccess NOT found"
            exit 1
          fi
          if [ -f dist/api/vendor/autoload.php ]; then
            echo "✓ vendor/autoload.php found"
          else
            echo "✗ vendor/autoload.php NOT found"
            exit 1
          fi

      - name: Inject secrets into api/config.php
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ENABLED: ${{ secrets.DB_ENABLED }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          CAREERJET_API_KEY: ${{ secrets.CAREERJET_API_KEY }}
          CAREERJET_AFFID: ${{ secrets.CAREERJET_AFFID }}
        run: |
          python3 -c "
          import os
          replacements = {
            '__VITE_GOOGLE_CLIENT_ID__': os.environ.get('VITE_GOOGLE_CLIENT_ID', ''),
            '__VITE_GOOGLE_CLIENT_SECRET__': os.environ.get('VITE_GOOGLE_CLIENT_SECRET', ''),
            '__DB_HOST__': os.environ.get('DB_HOST', ''),
            '__DB_PORT__': os.environ.get('DB_PORT', ''),
            '__DB_NAME__': os.environ.get('DB_NAME', ''),
            '__DB_USER__': os.environ.get('DB_USER', ''),
            '__DB_PASSWORD__': os.environ.get('DB_PASSWORD', ''),
            '__JOOBLE_API_KEY__': os.environ.get('JOOBLE_API_KEY', ''),
            '__THEIRSTACK_API_KEY__': os.environ.get('THEIRSTACK_API_KEY', ''),
            '__ADZUNA_APP_ID__': os.environ.get('ADZUNA_APP_ID', ''),
            '__ADZUNA_API_KEY__': os.environ.get('ADZUNA_API_KEY', ''),
            '__CAREERJET_API_KEY__': os.environ.get('CAREERJET_API_KEY', ''),
            '__CAREERJET_AFFID__': os.environ.get('CAREERJET_AFFID', ''),
          }
          path = 'dist/api/config.php'
          with open(path) as f:
            content = f.read()
          for placeholder, value in replacements.items():
            content = content.replace(placeholder, value)
          with open(path, 'w') as f:
            f.write(content)
          print('Secrets injected successfully')
          "

      - name: Create .env file with database credentials
        run: |
          echo "DB_ENABLED=${{ secrets.DB_ENABLED }}" > dist/api/.env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> dist/api/.env
          echo "DB_PORT=${{ secrets.DB_PORT }}" >> dist/api/.env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> dist/api/.env
          echo "DB_USER=${{ secrets.DB_USER }}" >> dist/api/.env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> dist/api/.env
          echo "LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}" >> dist/api/.env
          echo "OTEL_SERVICE_NAME=${{ secrets.OTEL_SERVICE_NAME || 'jajat-backend' }}" >> dist/api/.env

      - name: Set secure file permissions on secrets
        run: |
          chmod 600 dist/api/.env
          chmod 440 dist/api/config.php

      - name: Write SSH key to file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add remote host to known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure rsync is available
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Test SSH connectivity (debug)
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
        run: |
          ssh -v -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${REMOTE_PORT} ${REMOTE_USER}@${REMOTE_HOST} "whoami; pwd"

      - name: Pre-deploy PHP version check (v2.6.19 GATE)
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
        run: |
          # v2.6.19 GATE: shipping v2.6.19+ to a PHP < 8.4.1 production
          # server would trigger fatal runtime errors on the first HTTP
          # request (symfony/http-client 8.1.1 hard-requires php >=8.4.1;
          # the dist/api/vendor/ tree rsync'd from the Actions-built
          # artifact is compiled against the PHP 8.4 ABI). This step
          # enforces the gate programmatically: parses the production
          # server's `php -v` output and fails the deploy if the version
          # is below 8.4.1. See DOCS/PRODUCTION_PHP_UPGRADE.md (v2.6.27)
          # for the operator-facing upgrade procedure.
          PHP_VER=$(ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${REMOTE_PORT} ${REMOTE_USER}@${REMOTE_HOST} "php -v" | head -1 | sed -E 's/^PHP ([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          REQUIRED='8.4.1'
          if [ -z "$PHP_VER" ]; then
            echo "::error::Could not detect PHP version on the production server (php -v returned no parseable version). The codebase requires PHP ${REQUIRED} or newer per the v2.6.19 PRODUCTION SERVER UPGRADE GATE. See DOCS/PRODUCTION_PHP_UPGRADE.md for the upgrade procedure."
            exit 1
          fi
          if [ "$(printf '%s\n' "$PHP_VER" "$REQUIRED" | sort -V | head -1)" != "$REQUIRED" ]; then
            echo "::error::Production server is on PHP ${PHP_VER}; the codebase requires PHP ${REQUIRED} or newer per the v2.6.19 PRODUCTION SERVER UPGRADE GATE. See DOCS/PRODUCTION_PHP_UPGRADE.md for the upgrade procedure."
            exit 1
          fi
          echo "Production server PHP ${PHP_VER} >= ${REQUIRED} OK"

      - name: Deploy with rsync and retries
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_TARGET: ${{ secrets.REMOTE_TARGET }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${REMOTE_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          SRC="dist/"
          DEST="${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_TARGET}"
          ARGS="-az --delete --chmod=Du=rwx,Dg=rx,Fu=rw,Fg=r --partial --progress"

          max_attempts=5
          attempt=1
          until rsync $ARGS -e "$RSYNC_SSH" "$SRC" "$DEST"; do
            rc=$?
            echo "rsync failed with exit code $rc (attempt $attempt/$max_attempts)"
            if [ $attempt -ge $max_attempts ]; then
              echo "Maximum attempts reached, failing."
              exit $rc
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
          done

      - name: Clean up SSH key
        if: always()
        run: shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key

  composer-validate:
    name: Composer validate
    uses: ./.github/workflows/composer-validate.yml
    # NOTE: GitHub Actions strictly forbids `timeout-minutes:` on jobs that
    # `uses:` a reusable workflow (composer-validate.yml); the parser rejects
    # the file with "Unexpected value 'timeout-minutes'". The 10-minute cap is
    # enforced inside the called workflow's `validate` job. The CI gates
    # `scripts/check-yml-timeouts.sh` and `scripts/check-yml-concurrency.sh`
    # both exempt `uses:` callers for the same reason; see AGENTS.md "CI
    # Race Playbook".
    with:
    with:
      # php-version MUST stay in lock-step with the deploy workflow's main
      # job (line ~29: shivammathur/setup-php@2.37.2 php-version: "8.4").
      # composer-validate.yml's own comment enforces the same invariant.
      # Drift here produces a lockfile-mismatch failure mode identical to
      # the v2.6.0 release cycle's symfony/options-resolver 8.1.0 episode,
      # so we pass it explicitly rather than rely on the reusable
      # workflow's default.
      php-version: "8.4"
      working-directory: api

