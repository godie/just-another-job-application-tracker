name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ./dist

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build
    
      - name: Copy api/ into dist/ (include dotfiles e.g. .htaccess)
        run: |
          cp -r api dist/
          rm -rf api

      - name: Create config.php from example for deploy
        run: cp dist/api/config.example.php dist/api/config.php
      
      - name: Verify .htaccess exists before upload
        run: |
          echo "Files in dist/api/:"
          ls -la dist/api/
          if [ -f dist/api/.htaccess ]; then
            echo "✓ .htaccess found"
          else
            echo "✗ .htaccess NOT found"
            exit 1
          fi
      
      - name: Create tarball to preserve all files including dotfiles
        run: tar -czf dist.tar.gz -C dist .

      - name: Upload production-ready build files
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: dist.tar.gz

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: production-files
          path: ./
      
      - name: Extract tarball
        run: |
          mkdir -p dist
          tar -xzf dist.tar.gz -C dist
          rm -f dist.tar.gz
      

      - name: Verify .htaccess exists after extraction
        run: |
          echo "Files in dist/api/:"
          ls -la dist/api/
          if [ -f dist/api/.htaccess ]; then
            echo "✓ .htaccess found"
          else
            echo "✗ .htaccess NOT found"
            exit 1
          fi

      - name: Inject secrets into api/config.php
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}
        run: |
          python3 -c "
          import os
          path = 'dist/api/config.php'
          with open(path) as f:
              content = f.read()
          content = content.replace('__VITE_GOOGLE_CLIENT_ID__', os.environ.get('VITE_GOOGLE_CLIENT_ID', ''))
          content = content.replace('__VITE_GOOGLE_CLIENT_SECRET__', os.environ.get('VITE_GOOGLE_CLIENT_SECRET', ''))
          with open(path, 'w') as f:
              f.write(content)
          "

      - name: Write SSH key to file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Add remote host to known_hosts
        run: |
          ssh-keyscan -p ${{ secrets.REMOTE_PORT }} ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure rsync is available
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Test SSH connectivity (debug)
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
        run: |
          ssh -v -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -p ${REMOTE_PORT} ${REMOTE_USER}@${REMOTE_HOST} "whoami; pwd"

      - name: Deploy with rsync and retries
        env:
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          REMOTE_TARGET: ${{ secrets.REMOTE_TARGET }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -p ${REMOTE_PORT} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          SRC="dist/"
          DEST="${REMOTE_USER}@${REMOTE_HOST}:${REMOTE_TARGET}"
          ARGS="-az --delete --chmod=Du=rwx,Dg=rx,Fu=rw,Fg=r --partial --progress"

          max_attempts=5
          attempt=1
          until rsync $ARGS -e "$RSYNC_SSH" "$SRC" "$DEST"; do
            rc=$?
            echo "rsync failed with exit code $rc (attempt $attempt/$max_attempts)"
            if [ $attempt -ge $max_attempts ]; then
              echo "Maximum attempts reached, failing."
              exit $rc
            fi
            attempt=$((attempt + 1))
            sleep $((attempt * 5))
          done

      - name: Clean up SSH key
        if: always()
        run: shred -u ~/.ssh/deploy_key || rm -f ~/.ssh/deploy_key
